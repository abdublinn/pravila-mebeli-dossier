<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Аналитическое досье — доступ по паролю</title>
<style>
:root{--accent:#2d5a8c;--dark:#1b3651;--bg:#f4f7fb;--line:#d6e3f0;--muted:#586b7d;--red:#cf3b2e}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:linear-gradient(135deg,var(--dark),var(--accent));min-height:100vh;display:flex;align-items:center;justify-content:center;color:#16222e;padding:20px}
.gate{background:#fff;border-radius:16px;box-shadow:0 12px 40px rgba(0,0,0,.25);padding:34px 30px;max-width:420px;width:100%;text-align:center}
.lock{font-size:2.4rem;margin:0 0 6px}
h1{font-size:1.2rem;color:var(--dark);margin:0 0 6px}
p.sub{color:var(--muted);font-size:.92rem;margin:0 0 20px}
input{width:100%;padding:13px 14px;font-size:1rem;border:1px solid var(--line);border-radius:10px;text-align:center;letter-spacing:.04em;font-variant-numeric:tabular-nums}
input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(45,90,140,.15)}
button{margin-top:14px;width:100%;background:var(--accent);color:#fff;border:none;padding:13px;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer}
button:hover{opacity:.9}
.err{color:var(--red);font-size:.88rem;margin-top:12px;min-height:18px}
.foot{margin-top:18px;font-size:.78rem;color:var(--muted)}
</style>
</head>
<body>
<div class="gate" id="gate">
  <p class="lock">🔒</p>
  <h1>Группа «Правила мебели» (ex «Первый мебельный»)</h1>
  <p class="sub">Доступ к отчёту защищён. Введите пароль.</p>
  <form id="f" autocomplete="off">
    <input id="pw" type="password" placeholder="Пароль" autofocus aria-label="Пароль">
    <button type="submit">Открыть отчёт</button>
  </form>
  <div class="err" id="err"></div>
  <p class="foot">Контент зашифрован AES-256. Без пароля прочитать нельзя.</p>
</div>

function b64d(s){var bin=atob(s),u=new Uint8Array(bin.length);for(var i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i);return u;}
async function decrypt(pw){
  var enc=new TextEncoder();
  var km=await crypto.subtle.importKey("raw",enc.encode(pw),"PBKDF2",false,["deriveKey"]);
  var key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:b64d(SALT),iterations:ITER,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);
  var pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64d(IV)},key,b64d(CT));
  return new TextDecoder().decode(pt);
}
function render(html){document.open();document.write(html);document.close();}
async function tryOpen(pw,fromStore){
  try{var html=await decrypt(pw);try{sessionStorage.setItem("dk_pw",pw);}catch(e){}render(html);}
  catch(e){if(!fromStore){document.getElementById("err").textContent="Неверный пароль";document.getElementById("pw").value="";document.getElementById("pw").focus();}}
}
document.getElementById("f").addEventListener("submit",function(ev){ev.preventDefault();var pw=document.getElementById("pw").value;if(pw)tryOpen(pw,false);});
